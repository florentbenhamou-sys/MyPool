<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="drop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e0f7ff"/>
      <stop offset="1" stop-color="#bae6fd"/>
    </linearGradient>
    <clipPath id="rnd">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle grid overlay -->
  <g clip-path="url(#rnd)" opacity="0.06">
    <line x1="0" y1="128" x2="512" y2="128" stroke="white" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="white" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="white" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="white" stroke-width="1"/>
  </g>

  <!-- Water drop (mesure d'eau) -->
  <path d="M256 88 C256 88 160 230 160 295 C160 348 203 390 256 390 C309 390 352 348 352 295 C352 230 256 88 256 88 Z"
        fill="url(#drop)" opacity="0.95"/>

  <!-- Reflet dans la goutte -->
  <path d="M218 230 C218 220 226 213 235 216 C238 217 241 220 243 224"
        stroke="#0284c7" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.45"/>

  <!-- Vagues en bas -->
  <path d="M32 415 Q96 390 160 415 Q224 440 288 415 Q352 390 416 415 Q464 432 490 420"
        stroke="white" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.65"/>
  <path d="M22 458 Q96 433 170 458 Q244 483 318 458 Q392 433 460 455"
        stroke="white" stroke-width="11" fill="none" stroke-linecap="round" opacity="0.40"/>
</svg>
